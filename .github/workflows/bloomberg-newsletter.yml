name: Bloomberg Newsletter Pipeline

on:
  workflow_dispatch:
  schedule:
    # Every 3 days at 09:00 HKT (01:00 UTC)
    - cron: "0 1 */3 * *"
    # Sunday weekly digest at 10:00 HKT (02:00 UTC)
    - cron: "0 2 * * 0"

permissions:
  contents: write

jobs:
  newsletter-pipeline:
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Convert new PDFs to markdown
        shell: powershell
        run: |
          python tools/bloomberg_pdf_convert.py

      - name: Build weekly digest (Sunday only)
        shell: powershell
        run: |
          $dow = (Get-Date).DayOfWeek
          if ($dow -eq 'Sunday') {
            Write-Host "Sunday — generating weekly digest"
            python tools/bloomberg_weekly_digest.py
          } else {
            Write-Host "Not Sunday ($dow) — skipping weekly digest"
          }

      - name: Build newsletter from new articles
        shell: powershell
        run: |
          python tools/bloomberg_newsletter_build.py

      - name: Run pipeline tests
        shell: powershell
        run: |
          python -m pytest tests/test_bloomberg_pipeline.py -q

      - name: Commit and push
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/newsletter_*.html output/student.html
          git add outputs/ops/bloomberg_pipeline_state.json
          if (git diff --cached --quiet) {
            Write-Host "No new newsletter changes to commit."
            exit 0
          }
          git commit -m "Auto-generate Bloomberg newsletter"
          git push origin HEAD:main
