name: Dashboard Refresh

on:
  workflow_dispatch:
  # schedule disabled 2026-04-09 — DeepVue session broken, rebuilding with daily_login_ceremony.py
  # schedule:
  #   - cron: "10 1 * * 1-5"
  #   - cron: "35 7 * * 1-5"
  #   - cron: "20 8 * * 1-5"

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh Market Breadth source artifacts
        shell: powershell
        run: |
          python tools/refresh_dashboard_sources.py

      - name: Rebuild dashboard
        shell: powershell
        run: |
          python tools/build_dashboard.py

      - name: Verify dashboard freshness tests
        shell: powershell
        run: |
          python -m pytest tests/test_dashboard_freshness.py -q

      - name: Show tracked diff
        shell: powershell
        run: |
          git diff -- output/dashboard.html scraped_data/dashboard/market_breadth_latest.json scraped_data/dashboard/refresh_status.json scraped_data/smm/latest.json scraped_data/deepvue/market_overview.json scraped_data/deepvue/preopen.json scraped_data/hk_breadth/latest.json

      - name: Commit refreshed artifacts
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/dashboard.html
          git add -f scraped_data/dashboard/market_breadth_latest.json scraped_data/dashboard/refresh_status.json scraped_data/smm/latest.json scraped_data/deepvue/market_overview.json scraped_data/deepvue/preopen.json scraped_data/hk_breadth/latest.json
          if (git diff --cached --quiet) {
            Write-Host "No tracked dashboard changes to commit."
            exit 0
          }
          git commit -m "Refresh dashboard breadth artifacts"
          git push origin HEAD:main
